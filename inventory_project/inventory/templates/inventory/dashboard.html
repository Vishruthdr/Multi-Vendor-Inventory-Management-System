{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Inventory Overview</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f8f9fa;">

<div class="container py-5">

    <!-- Title -->
    <div class="text-center mb-5">
        <h2>📦 Inventory Overview Dashboard</h2>
        <p class="text-muted">Centralized view of all vendor products</p>
    </div>

    <!-- Stats Cards -->
    <div class="row g-4">

        <!-- Products -->
        <div class="col-lg-3 col-md-6">
            <div class="card text-center p-3 shadow-sm">
                <h6 class="text-muted">Products Available</h6>
                <h3 class="fw-bold">{{ total_products }}</h3>
            </div>
        </div>

        <!-- Vendors -->
        <div class="col-lg-3 col-md-6">
            <div class="card text-center p-3 shadow-sm">
                <h6 class="text-muted">Registered Vendors</h6>
                <h3 class="fw-bold">{{ total_vendors }}</h3>
            </div>
        </div>

        <!-- Stock -->
        <div class="col-lg-3 col-md-6">
            <div class="card text-center p-3 shadow-sm">
                <h6 class="text-muted">Overall Stock</h6>
                <h3 class="fw-bold">{{ total_stock }}</h3>
            </div>
        </div>

        <!-- Low Stock -->
        <div class="col-lg-3 col-md-6">
            <div class="card text-center p-3 shadow-sm border border-danger">
                <h6 class="text-danger">Items Low in Stock</h6>
                <h3 class="fw-bold text-danger">{{ low_stock }}</h3>
            </div>
        </div>

    </div>

    <!-- Action Buttons -->
    <div class="text-center mt-5">

      

        <a href="/products/" class="btn btn-outline-success">
            📋 View Product List
        </a>

    </div>

</div>

</body>
</html>
